<!DOCTYPE html>
<meta charset="utf-8">
<title>Billboard Top 10 Visualizations</title>
<link rel="stylesheet" type="text/css" href="./inspector.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  .grid-container {
    display: grid;
    grid-template-columns: 1fr 33.33%;
    grid-template-rows: 1fr auto;
    gap: 6px;
    padding: 6px;
    width: 100vw;
    height: 100vh;
  }
  .grid-container.bottom-expanded {
    grid-template-rows: 1fr auto;
  }
  .grid-container.right-collapsed {
    grid-template-columns: 1fr 36px;
  }
  .grid-cell {
    background: #0c0c0c;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    overflow: auto;
    min-height: 0;
    min-width: 0;
  }
  .cell-heatmap {
    grid-column: 1 / 2;
    grid-row: 1 / 2;
  }
  /* Right panel wrapper */
  .cell-chart-wrapper {
    grid-column: 2 / 3;
    grid-row: 1 / 2;
    display: flex;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
    background: #0c0c0c;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
  }
  .right-tab {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 4px;
    cursor: pointer;
    user-select: none;
    background: #0c0c0c;
    border-right: 1px solid #1a1a1a;
    flex-shrink: 0;
    min-width: 36px;
  }
  .right-tab:hover {
    background: #141414;
  }
  .right-tab h3 {
    margin: 0;
    font-size: 13px;
    color: #ffffff;
    font-weight: 500;
    white-space: nowrap;
  }
  .right-tab .right-arrow {
    font-size: 12px;
    color: #5ef1f2;
    transition: transform 0.2s ease;
    margin-bottom: 8px;
  }
  .right-tab .right-arrow.collapsed {
    transform: rotate(180deg);
  }
  .right-content {
    flex: 1;
    overflow: auto;
    min-width: 0;
  }
  .right-content.collapsed {
    display: none;
  }
  /* Bottom panel */
  .cell-ranklist {
    grid-column: 1 / 3;
    grid-row: 2 / 3;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .collapse-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
    background: #0c0c0c;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }
  .collapse-header:hover {
    background: #141414;
  }
  .collapse-header h3 {
    margin: 0;
    font-size: 14px;
    color: #ffffff;
    font-weight: 500;
  }
  .collapse-arrow {
    font-size: 12px;
    color: #5ef1f2;
    transition: transform 0.2s ease;
  }
  .collapse-arrow.collapsed {
    transform: rotate(-90deg);
  }
  .collapse-content {
    flex: 1;
    overflow: auto;
    min-height: 0;
  }
  .collapse-content.collapsed {
    display: none;
  }
  #viz-heatmap {
    zoom: 0.5;
  }
  #viz-heatmap .observablehq > div {
    width: 100%;
    height: 100%;
  }
  #viz-ranklist {
    zoom: 0.85;
    height: 100%;
  }
  #viz-ranklist .observablehq {
    height: 100%;
  }
  #viz-ranklist .observablehq > div {
    height: 100%;
  }
  #viz-chart {
    zoom: 0.55;
  }
  .hidden-controls {
    display: none;
  }
</style>
<body>
  <div class="hidden-controls">
    <div id="ctrl-year"></div>
    <div id="ctrl-artist"></div>
  </div>
  <div class="grid-container bottom-expanded" id="grid">
    <div class="grid-cell cell-heatmap" id="viz-heatmap"></div>
    <div class="cell-chart-wrapper" id="right-panel">
      <div class="right-tab" id="right-toggle">
        <h3 id="right-tab-title">Artist Ranking</h3>
      </div>
      <div class="right-content" id="right-content">
        <div id="viz-ranklist"></div>
      </div>
    </div>
    <div class="grid-cell cell-ranklist">
      <div class="collapse-header" id="collapse-toggle">
        <h3 id="collapse-title">Artist Chart</h3>
      </div>
      <div class="collapse-content" id="collapse-content">
        <div id="viz-chart"></div>
      </div>
    </div>
  </div>

<script type="module">

import define from "./index.js";
import {Runtime, Library, Inspector} from "./runtime.js";

const runtime = new Runtime();
const main = runtime.module(define, name => {
  switch (name) {
    case "viewof heatmap":
      return new Inspector(document.getElementById("viz-heatmap"));
    case "viewof artistScrollableChart":
      return new Inspector(document.getElementById("viz-chart"));
    case "viewof artistRankList":
      return new Inspector(document.getElementById("viz-ranklist"));
    case "viewof selectedYear":
      return new Inspector(document.getElementById("ctrl-year"));
    case "viewof selectedArtist":
      return new Inspector(document.getElementById("ctrl-artist"));
    default:
      return true;
  }
});

// --- Bottom panel collapse/expand ---
const toggle = document.getElementById("collapse-toggle");
const content = document.getElementById("collapse-content");
const grid = document.getElementById("grid");

toggle.addEventListener("click", () => {
  const isCollapsed = content.classList.toggle("collapsed");
  grid.classList.toggle("bottom-expanded", !isCollapsed);
});

// --- Right panel collapse/expand ---
const rightToggle = document.getElementById("right-toggle");
const rightContent = document.getElementById("right-content");

rightToggle.addEventListener("click", () => {
  const isCollapsed = rightContent.classList.toggle("collapsed");
  grid.classList.toggle("right-collapsed", isCollapsed);
});

// --- Update bottom title with selected artist ---
const collapseTitle = document.getElementById("collapse-title");
const ctrlArtistEl = document.getElementById("ctrl-artist");

function updateTitle() {
  const select = ctrlArtistEl.querySelector("select");
  if (select && select.selectedIndex >= 0) {
    const name = select.options[select.selectedIndex].textContent
      .replace(/_/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
    collapseTitle.textContent = name + " over the years";
  }
}

const selectorObserver = new MutationObserver(() => {
  const select = ctrlArtistEl.querySelector("select");
  if (select) {
    updateTitle();
    select.addEventListener("change", updateTitle);
    selectorObserver.disconnect();
  }
});
selectorObserver.observe(ctrlArtistEl, { childList: true, subtree: true });

const vizChart = document.getElementById("viz-chart");
const chartObserver = new MutationObserver(() => {
  setTimeout(updateTitle, 100);
});
chartObserver.observe(vizChart, { childList: true, subtree: true });

// --- Update right tab title with year ---
const rightTabTitle = document.getElementById("right-tab-title");
const ctrlYearEl = document.getElementById("ctrl-year");

function updateRightTitle() {
  const select = ctrlYearEl.querySelector("select");
  if (select && select.selectedIndex >= 0) {
    const year = select.options[select.selectedIndex].textContent;
    rightTabTitle.textContent = "Artist Ranking in " + year;
  }
}

const yearObserver = new MutationObserver(() => {
  const select = ctrlYearEl.querySelector("select");
  if (select) {
    updateRightTitle();
    select.addEventListener("change", updateRightTitle);
    yearObserver.disconnect();
  }
});
yearObserver.observe(ctrlYearEl, { childList: true, subtree: true });

const vizRanklist = document.getElementById("viz-ranklist");
const rankObserver = new MutationObserver(() => {
  setTimeout(updateRightTitle, 100);
});
rankObserver.observe(vizRanklist, { childList: true, subtree: true });

</script>
</body>
